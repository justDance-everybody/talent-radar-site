<style>
:root{
  --bg:#0f1115; --panel:#161a22; --panel2:#1d222d; --border:#2a2f3b;
  --fg:#e6e8ee; --muted:#8a91a3; --accent:#4ea1ff; --ok:#4ec9b0;
  --warn:#e4a05b; --bad:#ef6a6a; --gold:#d4b94a;
  --pf1:#4ea1ff; --pf2:#b988ff; --pf3:#4ec9b0; --pf4:#e4a05b; --pf5:#ff6b9f;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB",system-ui,sans-serif;font-size:14px;line-height:1.5}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:1400px;margin:0 auto;padding:20px}
header{border-bottom:1px solid var(--border);padding-bottom:16px;margin-bottom:20px}
h1{margin:0;font-size:22px;font-weight:600}
.sub{color:var(--muted);font-size:13px;margin-top:6px}
.sub b{color:var(--fg)}
.grid{display:grid;grid-template-columns:280px 1fr;gap:20px}
.sidebar{position:sticky;top:20px;align-self:start;max-height:calc(100vh - 40px);overflow-y:auto}
.panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.panel h3{margin:0 0 10px 0;font-size:13px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px}
.stat-row .lbl{color:var(--muted)}
.stat-row .val{font-weight:600;font-feature-settings:"tnum"}
.bar{display:flex;align-items:center;gap:8px;font-size:12px;margin:4px 0}
.bar .bar-lbl{width:100px;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar .bar-fill{flex:1;height:14px;background:var(--panel2);border-radius:3px;overflow:hidden;position:relative}
.bar .bar-fill span{display:block;height:100%;background:var(--accent)}
.bar .bar-val{width:24px;text-align:right;color:var(--muted);font-feature-settings:"tnum"}
.filter-group{margin-bottom:14px}
.filter-group:last-child{margin-bottom:0}
.chip{display:inline-block;padding:4px 10px;border:1px solid var(--border);border-radius:14px;font-size:12px;margin:2px 2px;cursor:pointer;background:var(--panel2);color:var(--muted);user-select:none}
.chip:hover{border-color:var(--accent)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.chip.mode-full_time_priority.active{background:var(--ok);border-color:var(--ok)}
.chip.mode-community_collaboration.active{background:var(--pf2);border-color:var(--pf2)}
.chip.mode-watchlist.active{background:var(--muted);border-color:var(--muted)}
.score-slider{display:flex;align-items:center;gap:8px;margin-top:8px}
.score-slider input{flex:1}
.score-slider .num{width:32px;text-align:center;font-feature-settings:"tnum";color:var(--muted)}
.search-box{width:100%;padding:8px 10px;background:var(--panel2);border:1px solid var(--border);border-radius:5px;color:var(--fg);font-family:inherit;font-size:13px}
.search-box:focus{outline:none;border-color:var(--accent)}
.btn-reset{display:block;width:100%;padding:8px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;font-size:12px;margin-top:8px}
.btn-reset:hover{border-color:var(--accent);color:var(--fg)}

.list-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;color:var(--muted);font-size:13px}
.list-head .sort{cursor:pointer}
.list-head .sort:hover{color:var(--fg)}

.card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.15s}
.card:hover{border-color:var(--accent)}
.card.expanded{border-color:var(--accent)}
.card-head{display:flex;gap:12px;align-items:flex-start}
.card-score{flex-shrink:0;width:52px;height:52px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;font-feature-settings:"tnum";background:var(--panel2)}
.card-score.s85{background:#4ec9b022;color:var(--ok);border:1px solid var(--ok)}
.card-score.s70{background:#4ea1ff22;color:var(--accent);border:1px solid var(--accent)}
.card-score.s55{background:#e4a05b22;color:var(--warn);border:1px solid var(--warn)}
.card-main{flex:1;min-width:0}
.card-name{font-size:16px;font-weight:600;margin:0 0 3px 0}
.card-meta{color:var(--muted);font-size:12px;margin-bottom:6px}
.card-why{font-size:13px;color:var(--fg);margin:6px 0 0 0;line-height:1.55}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px 4px 2px 0;background:var(--panel2);color:var(--muted)}
.tag.pf-runtime{background:#4ea1ff22;color:var(--pf1)}
.tag.pf-memory{background:#b988ff22;color:var(--pf2)}
.tag.pf-sci{background:#4ec9b022;color:var(--pf3)}
.tag.pf-eval{background:#e4a05b22;color:var(--pf4)}
.tag.pf-young{background:#ff6b9f22;color:var(--pf5)}
.tag.mode-full_time_priority{background:#4ec9b022;color:var(--ok)}
.tag.mode-community_collaboration{background:#b988ff22;color:var(--pf2)}
.tag.mode-watchlist{background:#8a91a322;color:var(--muted)}

.detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:none}
.card.expanded .detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.detail-sec h4{margin:0 0 8px 0;font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;font-weight:600}
.score-table{width:100%;border-collapse:collapse;font-size:12px;font-feature-settings:"tnum"}
.score-table td{padding:3px 0;border-bottom:1px dashed var(--border)}
.score-table td:last-child{text-align:right;font-weight:600}
.score-table td.penalty:last-child{color:var(--bad)}
.score-table td.bonus:last-child{color:var(--ok)}
.score-table tr.total td{font-size:14px;font-weight:700;padding-top:6px;border-bottom:none}
.ev-list{list-style:none;padding:0;margin:0}
.ev-list li{padding:4px 0;font-size:12px;border-bottom:1px dashed var(--border)}
.ev-list li:last-child{border-bottom:none}
.ev-type{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;background:var(--panel2);color:var(--muted);margin-right:6px;text-transform:uppercase}
.contacts{font-size:12px;line-height:1.8}
.contacts .ckey{color:var(--muted);display:inline-block;width:70px}
.risk{margin-top:10px}
.risk-tag{display:inline-block;padding:3px 8px;background:#ef6a6a22;color:var(--bad);border-radius:3px;font-size:11px;margin:2px}
.notes{margin-top:10px;padding:8px 10px;background:var(--panel2);border-radius:5px;font-size:12px;color:var(--muted);line-height:1.6}
.empty{text-align:center;padding:40px;color:var(--muted)}
@media(max-width:900px){
  .grid{grid-template-columns:1fr}
  .sidebar{position:static;max-height:none}
  .detail-grid{grid-template-columns:1fr}
}
</style>

<script>
(function(){
  const DATA = JSON.parse(document.getElementById('data').textContent);

    'Agent Runtime / Orchestration',
    'Memory / Context / Latent Communication',
    'Scientific Discovery / Research Automation',
    'Task Evaluation / Benchmark / Evals',
    'High-potential Young Talent'
  ];
  const MODES = ['full_time_priority','community_collaboration','watchlist'];
  const MODE_LABEL = {full_time_priority:'全职优先',community_collaboration:'社区合作',watchlist:'观察池'};

  const state = {
    profiles: new Set(),
    modes: new Set(),
    scoreMin: 55,
    scoreMax: 100,
    identity: 'all',
    search: '',
    sort: 'score'
  };

  function pfClass(p){
    if(!p) return '';
    if(p.startsWith('Agent Runtime')) return 'pf-runtime';
    if(p.startsWith('Memory')) return 'pf-memory';
    if(p.startsWith('Scientific')) return 'pf-sci';
    if(p.startsWith('Task Evaluation')) return 'pf-eval';
    if(p.startsWith('High-potential')) return 'pf-young';
    return '';
  }

  function pfShort(p){
    if(!p) return '';
    if(p.startsWith('Agent Runtime')) return 'Runtime';
    if(p.startsWith('Memory')) return 'Memory';
    if(p.startsWith('Scientific')) return 'SciDisc';
    if(p.startsWith('Task Evaluation')) return 'Evals';
    if(p.startsWith('High-potential')) return 'Young';
    return p;
  }

  function matchIdentity(c, id){
    if(id === 'all') return true;
    const role = (c.current_role || '').toLowerCase();
    if(id === 'student') return /phd|master|undergrad|student|本科|硕士|博士/.test(role);
    if(id === 'researcher') return /researcher|professor|faculty|scientist|教授|研究员|pi/.test(role);
    if(id === 'engineer') return /engineer|developer|staff|tech lead|工程师/.test(role);
    if(id === 'founder') return /founder|co-founder|ceo|creator|cto|联合创始|创始/.test(role);
    return true;
  }

  function filtered(){
    const q = state.search.trim().toLowerCase();
    let arr = CANDIDATES.filter(c => {
      if(state.profiles.size > 0 && !state.profiles.has(c.primary_profile)){
        const sp = c.secondary_profiles || [];
        if(!sp.some(p => state.profiles.has(p))) return false;
      }
      if(state.modes.size > 0 && !state.modes.has(c.recommended_mode)) return false;
      if(c.score_total < state.scoreMin || c.score_total > state.scoreMax) return false;
      if(!matchIdentity(c, state.identity)) return false;
      if(q){
        const blob = [
          c.name, c.current_role, c.current_institution, c.location,
          c.primary_profile, (c.secondary_profiles||[]).join(' '),
          c.why_fit, c.notes, (c.risk_flags||[]).join(' '),
          (c.evidence||[]).map(e=>e.title).join(' ')
        ].join(' ').toLowerCase();
        if(!blob.includes(q)) return false;
      }
      return true;
    });
    if(state.sort === 'score') arr.sort((a,b) => b.score_total - a.score_total);
    else if(state.sort === 'name') arr.sort((a,b) => a.name.localeCompare(b.name));
    return arr;
  }

  function escapeHtml(s){
    if(s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderScoreBadge(score){
    let cls = 's55';
    if(score >= 85) cls = 's85';

    return `<div class="card-score ${cls}">${score}</div>`;
  }

  function renderCard(c){
    const sp = (c.secondary_profiles||[]).map(p =>

      ['engineering','工程实现力 (0-20)', sb.engineering],
      ['theory','理论潜力 (0-15)', sb.theory],
      ['open_source','开源协作 (0-10)', sb.open_source],
      ['evals','Evals 相关 (0-15)', sb.evals],

      ['penalty_paper_only','纯论文扣分', sb.penalty_paper_only, 'penalty'],
      ['penalty_no_contact','联系方式不足扣分', sb.penalty_no_contact, 'penalty'],
      ['penalty_application_layer','应用包装层扣分', sb.penalty_application_layer, 'penalty']
    ];
    const scoreTable = scoreRows.map(r => {
      const val = r[2];
      if(val === undefined || val === null) return '';
      if(r[3] === 'penalty' && val === 0) return `<tr><td>${r[1]}</td><td>—</td></tr>`;
      const displayVal = r[3] === 'penalty' && val > 0 ? `-${val}` : val;
      const tdClass = r[3] === 'penalty' && val > 0 ? 'penalty' : (r[3] === 'bonus' && val > 0 ? 'bonus' : '');
      return `<tr><td>${r[1]}</td><td class="${tdClass}">${displayVal}</td></tr>`;
    }).join('');

    const evList = (c.evidence || []).map(e =>
      `<li><span class="ev-type">${escapeHtml(e.type||'')}</span><a href="${escapeHtml(e.url)}" target="_blank" rel="noopener">${escapeHtml(e.title || e.url)}</a></li>`
    ).join('');

    const pc = c.public_contacts || {};
    const contactRow = (k, label) => {
      const v = pc[k];
      if(!v) return '';
      const isUrl = /^https?:\/\//.test(v);
      const shown = isUrl ? `<a href="${escapeHtml(v)}" target="_blank" rel="noopener">${escapeHtml(v)}</a>` : escapeHtml(v);
      return `<div><span class="ckey">${label}</span>${shown}</div>`;
    };
    const contactsHtml =
      contactRow('email','Email') +
      contactRow('github','GitHub') +
      contactRow('homepage','Homepage') +
      contactRow('scholar','Scholar') +
      contactRow('x','X / Twitter') +
      contactRow('linkedin','LinkedIn');

    const risks = (c.risk_flags||[]).map(r => `<span class="risk-tag">${escapeHtml(r)}</span>`).join('');

    return `
<div class="card" data-id="${escapeHtml(c.id)}">
<div class="card-head">
${renderScoreBadge(c.score_total)}
<div class="card-main">
<div class="card-name">${escapeHtml(c.name)} <span style="color:var(--muted);font-size:12px;font-weight:400">· ${escapeHtml(c.location||'')}</span></div>
<div class="card-meta">${escapeHtml(c.current_role||'')} · ${escapeHtml(c.current_institution||'')}</div>
<div>
  <span class="tag ${pfClass(c.primary_profile)}">${escapeHtml(pfShort(c.primary_profile))}</span>
  ${sp}
  <span class="tag mode-${escapeHtml(c.recommended_mode)}">${escapeHtml(MODE_LABEL[c.recommended_mode]||c.recommended_mode)}</span>
  ${ccm}
</div>
<div class="card-why">${escapeHtml(c.why_fit||'')}</div>
</div>
</div>
<div class="detail">
<div class="detail-grid">
<div class="detail-sec">
<h4>分项得分</h4>
<table class="score-table">${scoreTable}
<tr class="total"><td>总分</td><td>${c.score_total}</td></tr>
</table>
</div>
<div class="detail-sec">
<h4>联系方式(公开可得)</h4>
<div class="contacts">${contactsHtml || '<span style="color:var(--muted)">未找到</span>'}</div>
${risks ? `<div class="risk"><h4 style="margin-top:12px">风险提示</h4>${risks}</div>` : ''}
</div>
</div>
<div class="detail-sec" style="margin-top:14px">
<h4>证据链接(${(c.evidence||[]).length})</h4>
<ul class="ev-list">${evList || '<li style="color:var(--muted)">未提供证据链接</li>'}</ul>
</div>
${c.notes ? `<div class="notes"><b>备注:</b>${escapeHtml(c.notes)}</div>` : ''}
</div>
</div>`;
  }

  function renderList(){
    const arr = filtered();
    document.getElementById('list-count').textContent = arr.length;
    const el = document.getElementById('list');
    if(arr.length === 0){
      el.innerHTML = '<div class="empty">无匹配候选人,请调整筛选条件</div>';
      return;
    }
    el.innerHTML = arr.map(renderCard).join('');
    el.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', e => {
        if(e.target.tagName === 'A') return;
        card.classList.toggle('expanded');
      });
    });
  }

  function renderBars(containerId, counts, totalLabel){
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    const max = Math.max(...Object.values(counts), 1);
    const html = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,v]) => {
      const pct = Math.round((v/max)*100);
      return `<div class="bar"><span class="bar-lbl" title="${escapeHtml(k)}">${escapeHtml(k)}</span><span class="bar-fill"><span style="width:${pct}%"></span></span><span class="bar-val">${v}</span></div>`;
    }).join('');
    document.getElementById(containerId).innerHTML = html;
  }

  function renderStats(){
    const profileCounts = {};
    const modeCounts = {};
    PROFILES.forEach(p => profileCounts[p] = 0);
    MODES.forEach(m => modeCounts[m] = 0);
    let sum = 0, top = 0, full = 0;
    CANDIDATES.forEach(c => {
      // primary counts
      if(profileCounts[c.primary_profile] !== undefined) profileCounts[c.primary_profile]++;
      // High-potential secondary counted separately
      if((c.secondary_profiles||[]).includes('High-potential Young Talent')){
        profileCounts['High-potential Young Talent']++;
      }
      modeCounts[c.recommended_mode]++;
      sum += c.score_total;
      if(c.score_total >= 85) top++;
      if(c.recommended_mode === 'full_time_priority') full++;
    });
    // Transform keys to short labels for bars
    const shortProfile = {};
    Object.entries(profileCounts).forEach(([k,v]) => {
      shortProfile[pfShort(k)] = v;
    });
    const shortMode = {};
    Object.entries(modeCounts).forEach(([k,v]) => {
      shortMode[MODE_LABEL[k]] = v;
    });
    renderBars('profile-bars', shortProfile);
    renderBars('mode-bars', shortMode);
    document.getElementById('count-avg').textContent = (sum/CANDIDATES.length).toFixed(1);
    document.getElementById('count-top').textContent = top;
    document.getElementById('count-full').textContent = full;
  }

  function renderFilters(){
    const pfEl = document.getElementById('profile-filters');
    pfEl.innerHTML = PROFILES.map(p =>
      `<span class="chip ${pfClass(p)}" data-profile="${escapeHtml(p)}">${escapeHtml(pfShort(p))}</span>`
    ).join('');
    pfEl.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const p = chip.dataset.profile;
        if(state.profiles.has(p)){ state.profiles.delete(p); chip.classList.remove('active'); }
        else { state.profiles.add(p); chip.classList.add('active'); }
        renderList();
      });
    });

    const mdEl = document.getElementById('mode-filters');
    mdEl.innerHTML = MODES.map(m =>
      `<span class="chip mode-${m}" data-mode="${m}">${MODE_LABEL[m]}</span>`
    ).join('');
    mdEl.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const m = chip.dataset.mode;
        if(state.modes.has(m)){ state.modes.delete(m); chip.classList.remove('active'); }
        else { state.modes.add(m); chip.classList.add('active'); }
        renderList();
      });
    });

    const idEl = document.getElementById('identity-filters');
    idEl.querySelectorAll('.chip').forEach(chip => {
      if(chip.dataset.identity === 'all') chip.classList.add('active');
      chip.addEventListener('click', () => {
        idEl.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        state.identity = chip.dataset.identity;
        renderList();
      });
    });
  }

  function bindControls(){
    const smin = document.getElementById('score-min');
    const smax = document.getElementById('score-max');
    const sminL = document.getElementById('score-min-lbl');
    const smaxL = document.getElementById('score-max-lbl');
    smin.addEventListener('input', () => {
      state.scoreMin = +smin.value;
      if(state.scoreMin > state.scoreMax){ smax.value = smin.value; state.scoreMax = state.scoreMin; smaxL.textContent = state.scoreMax; }
      sminL.textContent = state.scoreMin;
      renderList();
    });
    smax.addEventListener('input', () => {
      state.scoreMax = +smax.value;
      if(state.scoreMax < state.scoreMin){ smin.value = smax.value; state.scoreMin = state.scoreMax; sminL.textContent = state.scoreMin; }
      smaxL.textContent = state.scoreMax;
      renderList();
    });
    document.getElementById('search').addEventListener('input', e => {
      state.search = e.target.value;
      renderList();
    });
    document.querySelectorAll('.sort').forEach(s => {
      s.addEventListener('click', () => {
        state.sort = s.dataset.sort;
        renderList();
      });
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      state.profiles.clear(); state.modes.clear();
      state.scoreMin = 55; state.scoreMax = 100;
      state.identity = 'all'; state.search = '';
      document.querySelectorAll('#profile-filters .chip, #mode-filters .chip').forEach(c => c.classList.remove('active'));
      document.querySelectorAll('#identity-filters .chip').forEach(c => {
        c.classList.toggle('active', c.dataset.identity === 'all');
      });
      smin.value = 55; smax.value = 100; sminL.textContent = 55; smaxL.textContent = 100;
      document.getElementById('search').value = '';
      renderList();
    });
  }

  renderStats();
  renderFilters();
  bindControls();
  renderList();
})();
</script>
</body>
</html>
